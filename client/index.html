<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discover Local Music | Listicle</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <nav>
      <ul>
      <li><strong>Discover Local Music</strong></li></ul>
      <ul><li><a href="/edit-event.html?id=${event.id}" role="button" class="secondary">
  Edit Event
</a></li>
      <li><button id="logout-button" class="secondary">Logout</button></li>
      </ul>
    </nav>

    <header>
      <h1>Discover Local Music</h1>
      <p class="muted">Browse events. Click any item for details.</p>
    </header>
    <section>
  <form id="search-form">
    <input
      type="search"
      id="search-input"
      name="search"
      placeholder="Search events by name, venue, genre..."
    />
    <button type="submit">Search</button>
    <button type="button" id="clear-search" class="secondary">Clear</button>
  </form>
</section>
        <section id="events-container" class="grid"></section>
    
    <footer class="muted">
      <small>The web app uses only HTML, CSS, and JavaScript without a frontend framework.</small>
    </footer>
  </main>

  <script src="/script.js"></script>
</body>
</html>
